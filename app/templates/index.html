<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherVault - Advanced Security Dashboard</title>
    
    <!-- Bootstrap 5 CDN (Latest CSS) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <style>
        body {
            background: radial-gradient(circle at 50% 50%, #1a1c29 0%, #0e1017 100%);
            min-height: 100vh;
            color: #f8f9fa;
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .main-wrapper {
            width: 100%;
            max-width: 850px;
            padding: 20px;
        }

        .premium-card {
            background: linear-gradient(145deg, rgba(30, 35, 54, 0.7) 0%, rgba(15, 18, 28, 0.9) 100%);
            border: 1px solid rgba(0, 242, 254, 0.15);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 242, 254, 0.05);
            padding: 45px !important;
        }

        .gradient-title {
            background: linear-gradient(45deg, #00f2fe, #4facfe, #a8ff78);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .custom-label {
            font-size: 0.95rem;
            font-weight: 600;
            color: #a0aec0;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        /* Large Premium Input Fields */
        .big-input {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 2px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 14px !important;
            color: #ffffff !important;
            padding: 16px 20px !important;
            font-size: 1.1rem !important;
            transition: all 0.3s ease;
        }

        .big-input:focus {
            background: rgba(255, 255, 255, 0.06) !important;
            border-color: #00f2fe !important;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.25) !important;
        }

        .big-input::placeholder {
            color: #4a5568;
        }

        /* Action Buttons */
        .btn-action {
            padding: 18px !important;
            font-size: 1.1rem !important;
            font-weight: 700 !important;
            border-radius: 14px !important;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none !important;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .btn-lock {
            background: linear-gradient(45deg, #ff416c, #ff4b2b) !important;
            box-shadow: 0 6px 20px rgba(255, 65, 108, 0.3);
            color: #fff !important;
        }

        .btn-unlock {
            background: linear-gradient(45deg, #00b4db, #0083b0) !important;
            box-shadow: 0 6px 20px rgba(0, 180, 219, 0.3);
            color: #fff !important;
        }

        .btn-action:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
            filter: brightness(1.1);
        }

        /* Neon Output Box */
        .output-container {
            background: rgba(0, 0, 0, 0.4);
            border: 2px dashed rgba(0, 242, 254, 0.3);
            border-radius: 16px;
            padding: 25px;
            margin-top: 35px;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.6);
        }

        .output-text {
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 1.3rem;
            color: #a8ff78;
            text-shadow: 0 0 10px rgba(168, 255, 120, 0.3);
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    
    <!-- Django Messages (Alert Popups) -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show border-0 mb-4 p-3 shadow-lg" role="alert" style="border-radius: 14px;">
                <div class="d-flex align-items-center">
                    <i class="bi {% if message.tags == 'error' %}bi-exclamation-octagon-fill text-danger{% else %}bi-check-circle-fill text-success{% endif %} fs-4 me-3"></i>
                    <div class="fw-semibold text-dark">{{ message }}</div>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}

    <!-- Main Container Card -->
    <div class="premium-card">
        <div class="text-center mb-5">
            <h1 class="display-5 gradient-title mb-2">
                <i class="bi bi-shield-lock-fill me-2"></i>CipherVault
            </h1>
            <p class="text-secondary tracking-wide">Dynamic Cryptographic Algorithmic Logic Suite</p>
        </div>

        <!-- Form Element -->
        <form action="" method="POST">
            {% csrf_token %}
            
            <!-- Message Input Area -->
            <div class="mb-4">
                <label for="message" class="custom-label">SECRET MESSAGE</label>
                <textarea class="form-control big-input" id="message" name="message" rows="4" placeholder="Enter the plain text string or encrypted payload here..." required>{{ request.POST.message }}</textarea>
            </div>

            <!-- Key Parameter Input -->
            <div class="mb-5">
                <label for="keys" class="custom-label">SHIFT CONFIGURATION KEY</label>
                <input type="number" class="form-control big-input" id="keys" name="keys" value="{{ request.POST.keys }}" placeholder="Enter any large engineering integer (e.g. 100056)" required>
            </div>

            <!-- Double Dynamic Buttons -->
            <div class="row g-4">
                <div class="col-md-6">
                    <button type="submit" name="choise" value="1" class="btn btn-action btn-lock w-100">
                        <i class="bi bi-lock-fill me-2"></i> Encrypt & Lock
                    </button>
                </div>
                <div class="col-md-6">
                    <button type="submit" name="choise" value="2" class="btn btn-action btn-unlock w-100">
                        <i class="bi bi-unlock-fill me-2"></i> Decrypt & Unlock
                    </button>
                </div>
            </div>
        </form>

        <!-- Premium Output Block -->
        {% if result %}
        <div class="output-container">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="small fw-bold text-info text-uppercase tracking-wider"><i class="bi bi-cpu-fill me-2"></i>Processed Result</span>
            </div>
            <div class="output-text text-break font-monospace">{{ result }}</div>
        </div>
        {% endif %}

    </div>

    <!-- Clean Branding Footer -->
    <div class="text-center mt-4">
        <p class="text-muted small tracking-widest">&copy; 2026 Full-Stack Journey | Built with Django & Bootstrap 5</p>
    </div>

</div>

<!-- Bootstrap 5 JS Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
